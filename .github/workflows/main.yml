name: Main CI Pipeline

on:
  push:
  pull_request:
    branches:
      - main
    paths:
      - "**"
      - "!docs/**"
      - "!*.md"
      - "!LICENSE"
  workflow_dispatch:
  release:
    types: [published]

# When a PR is updated, cancel the jobs from the previous version. Merges
# do not define head_ref, so use run_id to never cancel those jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: digitalearthsweden/tutorials

permissions: {}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 85
    permissions:
      id-token: write   # This is required for requesting the JWT
      contents: read    # This is required for actions/checkout
      packages: write  # This is required for pushing to ghcr
      attestations: write # This is required for pushing the attestation
      artifact-metadata: write # This is required for creating the storage record

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # GitHub documentation states GITHUB_RUN_ID is unique, but it does not state it
      # is monotonically increasing, so use the number of commits on HEAD instead.
      - name: Get Git information
        run: |
          TIMESTAMP=$(git log -1 --pretty=%ct pyproject.toml uv.lock tutorials)
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          SEQUENCE_NUMBER=$(git rev-list --count HEAD)
          echo "SEQUENCE_NUMBER=$SEQUENCE_NUMBER" >> $GITHUB_ENV
          SHORT_SHA=$(git rev-parse --short ${GITHUB_SHA})
          echo "COMMIT_SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=prod-1_${{ env.SEQUENCE_NUMBER }}-${{ env.COMMIT_SHORT_SHA }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker test image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.TIMESTAMP }}

      - name: Run notebook tests
        run: |
          DES_DOCKER_IMAGE="${REGISTRY}/${IMAGE_NAME}:latest" ./start_tests.sh

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          cache-to: type=gha,mode=max
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.TIMESTAMP }}

      - name: Attest Docker image
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        id: attest
        with:
          push-to-registry: true
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
